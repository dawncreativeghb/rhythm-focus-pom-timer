<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Timer ring with gap in top-left quarter (270° arc from 12 o'clock around to 9 o'clock) -->
  <path d="M 32 6 A 26 26 0 1 1 6 32" />
  <!-- Tick marks around the visible portion of the ring -->
  <!-- 12 o'clock area skipped (gap). Ticks at 1,2,3,4,5,6,7,8 o'clock positions -->
  <line x1="45" y1="9.48" x2="43.5" y2="12.08" />
  <line x1="54.52" y1="19" x2="51.92" y2="20.5" />
  <line x1="58" y1="32" x2="55" y2="32" />
  <line x1="54.52" y1="45" x2="51.92" y2="43.5" />
  <line x1="45" y1="54.52" x2="43.5" y2="51.92" />
  <line x1="32" y1="58" x2="32" y2="55" />
  <line x1="19" y1="54.52" x2="20.5" y2="51.92" />
  <line x1="9.48" y1="45" x2="12.08" y2="43.5" />
  <!-- Play triangle (filled) -->
  <path d="M 27 24 L 27 40 L 41 32 Z" fill="#2DD4BF" stroke="none" />
</svg>
