<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#2DD4BF" stroke-linecap="round" stroke-linejoin="round">
  <!-- Timer ring: ~270° arc, radius 22, gap in top-left -->
  <path d="M 32 10 A 22 22 0 1 1 10 32" stroke-width="3.5" fill="none"/>
  <!-- Tick marks INSIDE the ring (radii 15 to 17.5), at 1,2,3,4,5,6,7,8 o'clock -->
  <!-- 1 o'clock: angle from top = 30°, sin=0.5, cos=0.866 -->
  <line x1="39.5" y1="19" x2="40.75" y2="16.83" stroke-width="1.8"/>
  <!-- 2 o'clock: 60°, sin=0.866, cos=0.5 -->
  <line x1="44.99" y1="24.5" x2="47.16" y2="23.25" stroke-width="1.8"/>
  <!-- 3 o'clock: 90° -->
  <line x1="47" y1="32" x2="49.5" y2="32" stroke-width="1.8"/>
  <!-- 4 o'clock: 120° -->
  <line x1="44.99" y1="39.5" x2="47.16" y2="40.75" stroke-width="1.8"/>
  <!-- 5 o'clock: 150° -->
  <line x1="39.5" y1="45" x2="40.75" y2="47.17" stroke-width="1.8"/>
  <!-- 6 o'clock: 180° -->
  <line x1="32" y1="47" x2="32" y2="49.5" stroke-width="1.8"/>
  <!-- 7 o'clock: 210° -->
  <line x1="24.5" y1="45" x2="23.25" y2="47.17" stroke-width="1.8"/>
  <!-- 8 o'clock: 240° -->
  <line x1="19.01" y1="39.5" x2="16.84" y2="40.75" stroke-width="1.8"/>
  <!-- Play triangle, centered -->
  <path d="M 27.5 25 L 27.5 39 L 39.5 32 Z" fill="#2DD4BF" stroke="none"/>
</svg>
