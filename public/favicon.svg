<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#2DD4BF" stroke-linecap="round" stroke-linejoin="round">
  <!-- Timer ring: ~270° arc, radius 22, gap in top-left, thinner stroke -->
  <path d="M 32 10 A 22 22 0 1 1 10 32" stroke-width="2.4" fill="none"/>
  <!-- Radial tick marks (pointing toward center). Inner radius 16.5, outer radius 19. -->
  <!-- Position = (32 + r*sin(a), 32 - r*cos(a)) where a is angle from 12 o'clock clockwise -->
  <!-- 1 o'clock: a=30°, sin=0.5, cos=0.8660 -->
  <line x1="40.25" y1="17.71" x2="41.5" y2="15.55" stroke-width="1.6"/>
  <!-- 2 o'clock: a=60°, sin=0.8660, cos=0.5 -->
  <line x1="46.29" y1="23.75" x2="48.45" y2="22.5" stroke-width="1.6"/>
  <!-- 3 o'clock: a=90° -->
  <line x1="48.5" y1="32" x2="51" y2="32" stroke-width="1.6"/>
  <!-- 4 o'clock: a=120° -->
  <line x1="46.29" y1="40.25" x2="48.45" y2="41.5" stroke-width="1.6"/>
  <!-- 5 o'clock: a=150° -->
  <line x1="40.25" y1="46.29" x2="41.5" y2="48.45" stroke-width="1.6"/>
  <!-- 6 o'clock: a=180° -->
  <line x1="32" y1="48.5" x2="32" y2="51" stroke-width="1.6"/>
  <!-- 7 o'clock: a=210° -->
  <line x1="23.75" y1="46.29" x2="22.55" y2="48.45" stroke-width="1.6"/>
  <!-- 8 o'clock: a=240° -->
  <line x1="17.71" y1="40.25" x2="15.55" y2="41.5" stroke-width="1.6"/>
  <!-- Play triangle, centered -->
  <path d="M 27.5 25 L 27.5 39 L 39.5 32 Z" fill="#2DD4BF" stroke="none"/>
</svg>
