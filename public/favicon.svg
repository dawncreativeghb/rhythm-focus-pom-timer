<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#2DD4BF" stroke-linecap="round" stroke-linejoin="round">
  <!-- Timer ring: ~270° arc, radius 28, gap in top-left, fills the canvas -->
  <path d="M 32 4 A 28 28 0 1 1 4 32" stroke-width="5" fill="none"/>
  <!-- Radial tick marks (pointing toward center). Inner radius 19, outer radius 23. -->
  <!-- 1 o'clock: a=30°, sin=0.5, cos=0.8660 -->
  <line x1="41.5" y1="15.55" x2="43.5" y2="12.08" stroke-width="3"/>
  <!-- 2 o'clock: a=60°, sin=0.8660, cos=0.5 -->
  <line x1="48.45" y1="22.5" x2="51.92" y2="20.5" stroke-width="3"/>
  <!-- 3 o'clock: a=90° -->
  <line x1="51" y1="32" x2="55" y2="32" stroke-width="3"/>
  <!-- 4 o'clock: a=120° -->
  <line x1="48.45" y1="41.5" x2="51.92" y2="43.5" stroke-width="3"/>
  <!-- 5 o'clock: a=150° -->
  <line x1="41.5" y1="48.45" x2="43.5" y2="51.92" stroke-width="3"/>
  <!-- 6 o'clock: a=180° -->
  <line x1="32" y1="51" x2="32" y2="55" stroke-width="3"/>
  <!-- 7 o'clock: a=210° -->
  <line x1="22.5" y1="48.45" x2="20.5" y2="51.92" stroke-width="3"/>
  <!-- 8 o'clock: a=240° -->
  <line x1="15.55" y1="41.5" x2="12.08" y2="43.5" stroke-width="3"/>
  <!-- Play triangle, centered, larger -->
  <path d="M 25 22 L 25 42 L 43 32 Z" fill="#2DD4BF" stroke="none"/>
</svg>
