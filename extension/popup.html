<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rhythm Focus</title>
    <style>
      :root {
        --bg: hsl(222 47% 11%);
        --card: hsl(222 47% 14%);
        --fg: hsl(210 40% 98%);
        --muted: hsl(215 20% 65%);
        --primary: hsl(174 62% 47%);
        --primary-fg: hsl(222 47% 11%);
        --break: hsl(38 92% 50%);
        --border: hsl(215 25% 22%);
        --danger: hsl(0 70% 60%);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 300px;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .wrap { padding: 20px; display: flex; flex-direction: column; gap: 16px; align-items: center; }
      .mode {
        display: inline-flex; gap: 4px; padding: 4px; background: var(--card);
        border-radius: 999px; border: 1px solid var(--border);
      }
      .mode button {
        background: transparent; color: var(--muted); border: 0; padding: 6px 14px;
        border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer;
        transition: all 0.2s;
      }
      .mode button.active { background: var(--primary); color: var(--primary-fg); }
      .mode button.active.break { background: var(--break); }
      .ring {
        width: 180px; height: 180px; border-radius: 50%;
        background: var(--card);
        display: flex; align-items: center; justify-content: center;
        position: relative; border: 4px solid var(--border);
        transition: border-color 0.3s;
      }
      .ring.focus { border-color: var(--primary); box-shadow: 0 0 40px hsl(174 62% 47% / 0.3); }
      .ring.break { border-color: var(--break); box-shadow: 0 0 40px hsl(38 92% 50% / 0.3); }
      .time { font-size: 42px; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
      .session { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
      .controls { display: flex; gap: 10px; width: 100%; }
      .btn {
        flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
        background: var(--card); color: var(--fg); font-size: 13px; font-weight: 600;
        cursor: pointer; transition: all 0.15s;
      }
      .btn:hover { background: hsl(222 47% 18%); }
      .btn.primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
      .btn.primary.break { background: var(--break); border-color: var(--break); }
      .btn.primary:hover { filter: brightness(1.1); }
      .open-web {
        background: transparent; border: 0; color: var(--muted); font-size: 11px;
        cursor: pointer; text-decoration: underline; padding: 0;
      }
      .open-web:hover { color: var(--fg); }

      /* Account row */
      .account {
        width: 100%; display: flex; align-items: center; justify-content: space-between;
        gap: 8px; font-size: 11px; color: var(--muted);
        padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
        background: var(--card);
      }
      .account .email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .account button {
        background: transparent; border: 0; color: var(--muted);
        font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0;
      }
      .account button:hover { color: var(--fg); }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
      .dot.off { background: var(--muted); }

      /* Sign in panel */
      .signin {
        width: 100%; display: flex; flex-direction: column; gap: 10px;
        padding: 14px; border: 1px solid var(--border); border-radius: 10px;
        background: var(--card);
      }
      .signin h3 { font-size: 13px; font-weight: 600; }
      .signin p { font-size: 11px; color: var(--muted); line-height: 1.4; }
      .signin input {
        background: var(--bg); color: var(--fg); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: inherit;
      }
      .signin input:focus { outline: none; border-color: var(--primary); }
      .signin .row { display: flex; gap: 8px; }
      .signin .row .btn { padding: 8px; font-size: 12px; }
      .signin .err {
        color: var(--danger); font-size: 11px; min-height: 14px;
      }
      .signin .web-link {
        text-align: center; font-size: 11px; color: var(--muted);
      }
      .signin .web-link a { color: var(--primary); text-decoration: none; }
      .signin .web-link a:hover { text-decoration: underline; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mode" id="mode-switch">
        <button data-mode="focus" class="active">Focus</button>
        <button data-mode="break">Break</button>
      </div>
      <div class="ring focus" id="ring">
        <div style="text-align: center;">
          <div class="time" id="time">25:00</div>
          <div class="session" id="session">Session 1</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn primary" id="toggle">Start</button>
        <button class="btn" id="reset">Reset</button>
        <button class="btn" id="skip">Skip</button>
      </div>

      <div class="account" id="account">
        <span class="dot off" id="account-dot"></span>
        <span class="email" id="account-email">Local only</span>
        <button id="account-action">Sign in</button>
      </div>

      <div class="signin hidden" id="signin">
        <h3>Sign in to sync</h3>
        <p>Sign in with the same account you use on the web app to keep your timer in sync across devices.</p>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        <div class="row">
          <button class="btn primary" id="signin-submit">Sign in</button>
          <button class="btn" id="signin-signup">Create account</button>
        </div>
        <div class="err" id="signin-err"></div>
        <div class="web-link">
          Used Google? <a href="#" id="signin-web">Sign in on the web</a>
        </div>
      </div>

      <button class="open-web" id="open-web">Open full app</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
